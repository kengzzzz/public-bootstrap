x-common-build-args: &common-build-args
  ARCH_IMAGE_DIGEST: sha256:36301eef718527e362e568206b7606a3246c1fc089b24fce20c47cf68065f229
  UBUNTU_IMAGE_DIGEST: sha256:c4a8d5503dfb2a3eb8ab5f807da5bc69a85730fb49b5cfca2330194ebcc41c7b
  CACHYOS_COMMIT_HASH: 35bd020a4bad140d3a1efee8f8877cf566b3f8eb
  KERNEL_COMMIT_HASH: 24da68625ce48a4ea1b28996050f1229e7bc78a2
  PROPELLER_COMMIT_HASH: e7a831e46e8822f00d0fb9082486745c62748a7e
  LLVM_GPG_FINGERPRINT: 6084F3CF814B57C1CF12EFD515CF4D18AF4F7421

services:
  kernel-autofdo:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.kernel
      args:
        <<: *common-build-args
        FLAVOR: autofdo
    image: kernel-autofdo
    container_name: kernel-autofdo
    volumes:
      - ./scripts:/scripts:ro
      - ./out:/out
    tmpfs:
      - /build:rw,exec,size=64G,mode=1777
    command:
      - bash
      - /scripts/build-cachyos-package.sh
      - autofdo

  autofdo:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.autofdo
      args:
        <<: *common-build-args
    image: autofdo
    container_name: autofdo
    privileged: true
    pid: "host"
    volumes:
      - ./scripts:/scripts:ro
      - ./profiles:/profiles
      - ./out:/out
    tmpfs:
      - /build:rw,exec,size=64G,mode=1777
    command:
      - bash
      - /scripts/generate-autofdo-profile.sh

  kernel-propeller:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.kernel
      args:
        <<: *common-build-args
        FLAVOR: propeller
    image: kernel-propeller
    container_name: kernel-propeller
    volumes:
      - ./scripts:/scripts:ro
      - ./out:/out
    tmpfs:
      - /build:rw,exec,size=64G,mode=1777
    command:
      - bash
      - /scripts/build-cachyos-package.sh
      - propeller

  propeller:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.propeller
      args:
        <<: *common-build-args
    image: propeller
    container_name: propeller
    privileged: true
    pid: "host"
    volumes:
      - ./scripts:/scripts:ro
      - ./profiles:/profiles
      - ./out:/out
    tmpfs:
      - /build:rw,exec,size=64G,mode=1777
    command:
      - bash
      - /scripts/generate-propeller-profile.sh

  kernel-config:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.kernel
      args:
        <<: *common-build-args
        FLAVOR: kernel
    image: kernel-toolchain
    container_name: kernel-config
    volumes:
      - ./scripts:/scripts:ro
      - ./patches:/patches
    tmpfs:
      - /build:rw,exec,size=64G,mode=1777
    command:
      - bash
      - /scripts/generate-config-patch.sh

  kernel-builder:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.kernel
      args:
        <<: *common-build-args
        FLAVOR: kernel
    image: kernel-toolchain
    container_name: kernel-builder
    volumes:
      - ./scripts:/scripts:ro
      - ./out:/out
      - ./patches/config.patch:/patches/config.patch:ro
    tmpfs:
      - /build:rw,exec,size=64G,mode=1777
    command:
      - bash
      - /scripts/build-custom-kernel.sh
